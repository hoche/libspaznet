name: Linux ARM64

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build and Test - Linux ARM64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and test in ARM64 container
        run: |
          # ubuntu:25.10 (questing) packages OpenSSL 3.5 via apt, so we can
          # skip the ~10 min from-source build that ubuntu:24.04 forced under
          # QEMU. g++ on 25.10 is new enough for <format>.
          # (No buildx needed — plain `docker run`, not `docker buildx`.)
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace -w /workspace \
            ubuntu:25.10 bash -c '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y build-essential g++ cmake ninja-build git \
                               ca-certificates iperf3 libssl-dev
            jobs="$(nproc)"
            export CMAKE_BUILD_PARALLEL_LEVEL="$jobs"
            mkdir -p build && cd build
            cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..
            grep -q "SPAZNET_BUILD_QUIC:BOOL=ON" CMakeCache.txt
            cmake --build . --parallel "$jobs"
            # Tests stay serial: several integration suites bind fixed ports.
            ctest --output-on-failure
          '
