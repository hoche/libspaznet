name: macOS ARM64

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build and Test - macOS 14 ARM64
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.14
        with:
          cmake-version: '3.30'

      - name: Install dependencies
        run: |
          # Do not swallow brew failures with `|| true` — a missing
          # openssl@3.5 would silently disable QUIC (find_package QUIET)
          # while the job still looked green. CMake comes from the
          # setup-cmake step above; no need to brew it.
          brew install openssl@3.5 iperf3
          OPENSSL_PREFIX="$(brew --prefix openssl@3.5)"
          if [[ ! -d "$OPENSSL_PREFIX" ]]; then
            echo "openssl@3.5 prefix missing: $OPENSSL_PREFIX" >&2
            exit 1
          fi
          echo "OPENSSL_ROOT_DIR=$OPENSSL_PREFIX" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR"

      - name: Verify QUIC enabled
        run: |
          # Fail fast if OpenSSL 3.5 wasn't found and QUIC was auto-disabled.
          grep -q 'SPAZNET_BUILD_QUIC:BOOL=ON' build/CMakeCache.txt

      - name: Build
        run: |
          cd build
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure
