name: macOS ARM64

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build and Test - macOS 14 ARM64
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.14
        with:
          cmake-version: '3.30'

      - name: Install dependencies
        run: |
          brew install cmake openssl@3.5 iperf3 || true
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3.5)" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR"

      - name: Build
        run: |
          cd build
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure
