name: Windows Server 2025 (VS 2026)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build and Test - Windows Server 2025 Visual Studio 2026
    # windows-2025 now ships VS 2026 by default (post June 2026 migration).
    # The temporary windows-2025-vs2026 label is no longer needed.
    runs-on: windows-2025

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.14
        with:
          # "Visual Studio 18 2026" generator requires CMake >= 4.2.
          cmake-version: '4.2.0'

      - name: Install Visual Studio Build Tools
        uses: microsoft/setup-msbuild@v2

      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/vcpkg/archives
            ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
          key: vcpkg-openssl-${{ runner.os }}-x64-windows

      - name: Install OpenSSL via vcpkg
        shell: pwsh
        run: |
          # Chocolatey's `openssl` package mirrors Shining Light's CDN,
          # which 404s on pinned older 3.5.x versions whenever SLProWeb
          # updates. vcpkg builds OpenSSL from source — slower first
          # run (~5 min) but cached, and the version tracks vcpkg's
          # port (currently 3.5+).
          $jobs = [int]$env:NUMBER_OF_PROCESSORS
          $env:VCPKG_MAX_CONCURRENCY = "$jobs"
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install openssl:x64-windows
          "VCPKG_TOOLCHAIN=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE_BUILD_PARALLEL_LEVEL=$jobs" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure CMake
        shell: pwsh
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 18 2026" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_TOOLCHAIN" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Verify QUIC enabled
        shell: pwsh
        run: |
          if (-not (Select-String -Path build/CMakeCache.txt -Pattern 'SPAZNET_BUILD_QUIC:BOOL=ON' -Quiet)) {
            throw "SPAZNET_BUILD_QUIC is not ON — OpenSSL 3.5 was not found"
          }

      - name: Build
        shell: pwsh
        run: |
          cd build
          cmake --build . --config Release --parallel $env:CMAKE_BUILD_PARALLEL_LEVEL

      - name: Run Tests
        shell: pwsh
        run: |
          cd build
          # Tests stay serial: several integration suites bind fixed ports.
          ctest -C Release --output-on-failure
