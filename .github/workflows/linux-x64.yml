name: Linux x64

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build and Test - Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and test in Ubuntu 25.10 container
        run: |
          # Host runner is still 24.04 (OpenSSL 3.0). Pull OpenSSL 3.5 from
          # ubuntu:25.10 apt instead of building it from source. Native amd64
          # — no QEMU.
          docker run --rm \
            -v ${{ github.workspace }}:/workspace -w /workspace \
            ubuntu:25.10 bash -c '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y build-essential g++ cmake git ca-certificates \
                               iperf3 libssl-dev
            mkdir -p build && cd build
            cmake ..
            grep -q "SPAZNET_BUILD_QUIC:BOOL=ON" CMakeCache.txt
            cmake --build . --config Release -j$(nproc)
            ctest --output-on-failure
          '
