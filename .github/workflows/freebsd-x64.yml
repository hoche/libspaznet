name: FreeBSD x86_64

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Boots a FreeBSD VM under QEMU on the Linux runner via
# vmactions/freebsd-vm. FreeBSD 14.x ships clang in base and has cmake /
# gcc available via pkg. Native x86_64 KVM acceleration when the runner
# supports it; otherwise software TCG (slower but still works).
jobs:
  build-test:
    name: Build and Test - FreeBSD x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and test on FreeBSD x86_64
        uses: vmactions/freebsd-vm@v1
        with:
          release: '14.2'
          arch: amd64
          usesh: true
          prepare: |
            # security/openssl35 ships the 3.5 series. Installs to
            # /usr/local/openssl35 with a versioned suffix so it
            # doesn't shadow the OpenSSL 3.0 in base.
            pkg install -y cmake git openssl35 iperf3
          run: |
            mkdir -p build
            cd build
            cmake .. -DOPENSSL_ROOT_DIR=/usr/local/openssl35
            cmake --build . --config Release -j$(sysctl -n hw.ncpu)
            ctest --output-on-failure
