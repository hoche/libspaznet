name: FreeBSD aarch64

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Same shape as freebsd-x64, ARM64 via QEMU TCG. No KVM, so noticeably
# slower; allow the action's default timeout (the build + tests for the
# non-QUIC subset take roughly 5-10 minutes).
jobs:
  build-test:
    name: Build and Test - FreeBSD aarch64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and test on FreeBSD aarch64
        uses: vmactions/freebsd-vm@v1
        with:
          release: '14.2'
          arch: aarch64
          usesh: true
          prepare: |
            pkg install -y cmake git iperf3
          run: |
            mkdir -p build
            cd build
            cmake ..
            cmake --build . --config Release -j$(sysctl -n hw.ncpu)
            ctest --output-on-failure
