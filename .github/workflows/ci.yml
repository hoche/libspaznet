name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # Linux x64
  build-test-linux-x64:
    name: Build and Test - Linux x64
    runs-on: ubuntu-latest

    env:
      OPENSSL_VERSION: 3.5.4
      OPENSSL_PREFIX: ${{ github.workspace }}/.openssl

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.14
        with:
          cmake-version: '3.30'

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Need gcc 13.1+ for <format>; noble (24.04) has g++-13 available.
          sudo apt-get install -y build-essential g++-13
          echo "CC=gcc-13"  >> "$GITHUB_ENV"
          echo "CXX=g++-13" >> "$GITHUB_ENV"

      - name: Cache OpenSSL ${{ env.OPENSSL_VERSION }}
        id: openssl-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENSSL_PREFIX }}
          key: openssl-${{ env.OPENSSL_VERSION }}-linux-x64

      - name: Build OpenSSL ${{ env.OPENSSL_VERSION }}
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          cd /tmp
          curl -sSL -O "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz"
          tar xzf "openssl-${OPENSSL_VERSION}.tar.gz"
          cd "openssl-${OPENSSL_VERSION}"
          ./Configure --prefix="${OPENSSL_PREFIX}" --openssldir="${OPENSSL_PREFIX}" no-tests shared
          make -j$(nproc)
          make install_sw

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DOPENSSL_ROOT_DIR="${OPENSSL_PREFIX}"

      - name: Build
        run: |
          cd build
          cmake --build . --config Release -j$(nproc)

      - name: Run Unit Tests
        run: |
          cd build
          LD_LIBRARY_PATH="${OPENSSL_PREFIX}/lib64:${OPENSSL_PREFIX}/lib" \
            ./test_unit || ctest -R UnitTests --output-on-failure

      - name: Run Integration Tests
        run: |
          cd build
          LD_LIBRARY_PATH="${OPENSSL_PREFIX}/lib64:${OPENSSL_PREFIX}/lib" \
            ./test_integration || ctest -R IntegrationTests --output-on-failure

      - name: Run All Tests with CTest
        env:
          LD_LIBRARY_PATH: ${{ env.OPENSSL_PREFIX }}/lib64:${{ env.OPENSSL_PREFIX }}/lib
        run: |
          cd build
          ctest --output-on-failure

  # Linux ARM64 (using Docker with QEMU)
  build-test-linux-arm64:
    name: Build and Test - Linux ARM64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test in ARM64 container
        run: |
          # ubuntu:24.04 ships g++-13 in apt; we still build OpenSSL 3.5
          # from source because no Ubuntu release through 25.10 has it
          # packaged. Building under QEMU is slow (~10 min); the rest of
          # the test suite runs in another few minutes.
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace -w /workspace \
            ubuntu:24.04 bash -c '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y build-essential g++-13 cmake git curl ca-certificates
            export CC=gcc-13 CXX=g++-13
            cd /tmp
            curl -sSL -O https://github.com/openssl/openssl/releases/download/openssl-3.5.4/openssl-3.5.4.tar.gz
            tar xzf openssl-3.5.4.tar.gz
            cd openssl-3.5.4
            ./Configure --prefix=/opt/openssl-3.5 --openssldir=/opt/openssl-3.5 no-tests shared
            make -j$(nproc)
            make install_sw
            cd /workspace
            mkdir -p build && cd build
            cmake .. -DOPENSSL_ROOT_DIR=/opt/openssl-3.5
            cmake --build . --config Release -j$(nproc)
            export LD_LIBRARY_PATH=/opt/openssl-3.5/lib64:/opt/openssl-3.5/lib
            ./test_unit         || ctest -R UnitTests        --output-on-failure
            ./test_integration  || ctest -R IntegrationTests --output-on-failure
            ctest --output-on-failure
          '

  # macOS ARM64 (Apple Silicon)
  build-test-macos-arm64:
    name: Build and Test - macOS 14 ARM64
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.14
        with:
          cmake-version: '3.30'

      - name: Install dependencies
        run: |
          brew install cmake openssl@3.5 || true
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3.5)" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR"

      - name: Build
        run: |
          cd build
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)

      - name: Run Unit Tests
        run: |
          cd build
          ./test_unit || ctest -R UnitTests --output-on-failure

      - name: Run Integration Tests
        run: |
          cd build
          ./test_integration || ctest -R IntegrationTests --output-on-failure

      - name: Run All Tests with CTest
        run: |
          cd build
          ctest --output-on-failure

  build-test-macos-x64:
    name: Build and Test - macOS 14 x64
    runs-on: macos-14-large

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.14
        with:
          cmake-version: '3.30'

      - name: Install dependencies
        run: |
          brew install cmake || true

      - name: Configure CMake (x64)
        run: |
          mkdir -p build
          cd build
          # Force x64 architecture
          arch -x86_64 cmake .. -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR" \
            || cmake .. -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR"

      - name: Build (x64)
        run: |
          cd build
          arch -x86_64 cmake --build . --config Release -j$(sysctl -n hw.ncpu) || cmake --build . --config Release -j$(sysctl -n hw.ncpu)

      - name: Run Unit Tests
        run: |
          cd build
          arch -x86_64 ./test_unit || ./test_unit || ctest -R UnitTests --output-on-failure

      - name: Run Integration Tests
        run: |
          cd build
          arch -x86_64 ./test_integration || ./test_integration || ctest -R IntegrationTests --output-on-failure

      - name: Run All Tests with CTest
        run: |
          cd build
          ctest --output-on-failure

  # Windows Server build
  build-test-windows-server:
    name: Build and Test - Windows Server 2025
    runs-on: windows-2025

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.14
        with:
          cmake-version: '3.30'

      - name: Install Visual Studio Build Tools
        uses: microsoft/setup-msbuild@v1.1

      - name: Install OpenSSL 3.5+
        shell: pwsh
        run: |
          # Shining Light's OpenSSL 3.5 binaries via chocolatey. The
          # Windows runners ship choco pre-installed. CMake finds the
          # install at C:\Program Files\OpenSSL-Win64 by default; we
          # set OPENSSL_ROOT_DIR explicitly to be sure.
          choco install openssl --version=3.5.4 --no-progress -y
          $env:OPENSSL_ROOT_DIR = "C:\Program Files\OpenSSL-Win64"
          "OPENSSL_ROOT_DIR=$env:OPENSSL_ROOT_DIR" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DOPENSSL_ROOT_DIR="$env:OPENSSL_ROOT_DIR"

      - name: Build
        run: |
          cd build
          cmake --build . --config Release -j

      - name: Run Unit Tests
        run: |
          cd build
          .\Release\test_unit.exe || ctest -C Release -R UnitTests --output-on-failure

      - name: Run Integration Tests
        run: |
          cd build
          .\Release\test_integration.exe || ctest -C Release -R IntegrationTests --output-on-failure

      - name: Run All Tests with CTest
        run: |
          cd build
          ctest -C Release --output-on-failure

  # Windows 11 build (using windows-latest which should be Windows Server 2022 or newer)
  build-test-windows-server_vs2026:
    name: Build and Test - Windows Server 2025 Visual Studio 2026
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.14
        with:
          cmake-version: '3.30'

      - name: Install Visual Studio Build Tools
        uses: microsoft/setup-msbuild@v1.1

      - name: Install OpenSSL 3.5+
        shell: pwsh
        run: |
          # Shining Light's OpenSSL 3.5 binaries via chocolatey. The
          # Windows runners ship choco pre-installed. CMake finds the
          # install at C:\Program Files\OpenSSL-Win64 by default; we
          # set OPENSSL_ROOT_DIR explicitly to be sure.
          choco install openssl --version=3.5.4 --no-progress -y
          $env:OPENSSL_ROOT_DIR = "C:\Program Files\OpenSSL-Win64"
          "OPENSSL_ROOT_DIR=$env:OPENSSL_ROOT_DIR" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DOPENSSL_ROOT_DIR="$env:OPENSSL_ROOT_DIR"

      - name: Build
        run: |
          cd build
          cmake --build . --config Release -j

      - name: Run Unit Tests
        run: |
          cd build
          .\Release\test_unit.exe || ctest -C Release -R UnitTests --output-on-failure

      - name: Run Integration Tests
        run: |
          cd build
          .\Release\test_integration.exe || ctest -C Release -R IntegrationTests --output-on-failure

      - name: Run All Tests with CTest
        run: |
          cd build
          ctest -C Release --output-on-failure


  # FreeBSD x86_64 — boots a FreeBSD VM under QEMU on the Linux runner
  # via vmactions/freebsd-vm. FreeBSD 14.x ships clang in base and has
  # cmake / gcc available via pkg. Native x86_64 KVM acceleration when
  # the runner supports it; otherwise software TCG (slower but still
  # works).
  build-test-freebsd-x64:
    name: Build and Test - FreeBSD x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and test on FreeBSD x86_64
        uses: vmactions/freebsd-vm@v1
        with:
          release: '14.2'
          arch: amd64
          usesh: true
          prepare: |
            # security/openssl35 ships the 3.5 series. Installs to
            # /usr/local/openssl35 with a versioned suffix so it
            # doesn't shadow the OpenSSL 3.0 in base.
            pkg install -y cmake git openssl35
          run: |
            mkdir -p build
            cd build
            cmake .. -DOPENSSL_ROOT_DIR=/usr/local/openssl35
            cmake --build . --config Release -j$(sysctl -n hw.ncpu)
            ./test_unit || ctest -R UnitTests --output-on-failure
            ./test_integration || ctest -R IntegrationTests --output-on-failure
            ctest --output-on-failure

  # FreeBSD aarch64 — same shape, ARM64 via QEMU TCG. No KVM, so
  # noticeably slower; allow the action's default timeout (the build +
  # tests for the non-QUIC subset take roughly 5-10 minutes).
  build-test-freebsd-arm64:
    name: Build and Test - FreeBSD aarch64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and test on FreeBSD aarch64
        uses: vmactions/freebsd-vm@v1
        with:
          release: '14.2'
          arch: aarch64
          usesh: true
          prepare: |
            pkg install -y cmake git
          run: |
            mkdir -p build
            cd build
            cmake ..
            cmake --build . --config Release -j$(sysctl -n hw.ncpu)
            ./test_unit || ctest -R UnitTests --output-on-failure
            ./test_integration || ctest -R IntegrationTests --output-on-failure
            ctest --output-on-failure
