<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" role="img" aria-labelledby="title">
  <title id="title">libspaznet architecture overview</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <style>
      .group { fill: none; stroke: #888; stroke-dasharray: 5 3; stroke-width: 1; }
      .group-label { font: 600 12px sans-serif; fill: #555; }
      .app   { fill: #ffe1f5; stroke: #555; stroke-width: 1.4; }
      .io    { fill: #e1f5ff; stroke: #555; stroke-width: 1.4; }
      .work  { fill: #fff4e1; stroke: #555; stroke-width: 1.4; }
      .plat  { fill: #e1ffe1; stroke: #555; stroke-width: 1.4; }
      .coro  { fill: #f0e1ff; stroke: #555; stroke-width: 1.4; }
      .store { fill: #fdf6e3; stroke: #777; stroke-width: 1.4; }
      .label { font: 13px sans-serif; fill: #222; text-anchor: middle; }
      .small { font: 11px sans-serif; fill: #555; text-anchor: middle; }
      .edge  { stroke: #444; stroke-width: 1.4; fill: none; }
      .edge-label { font: 11px sans-serif; fill: #333; text-anchor: middle; }
      .edge-label-bg { fill: white; }
    </style>
  </defs>

  <!-- Application layer (top) -->
  <rect class="group" x="40" y="30" width="900" height="100" rx="8"/>
  <text class="group-label" x="60" y="50">Application Layer</text>
  <rect class="app" x="350" y="70" width="280" height="40" rx="6"/>
  <text class="label" x="490" y="94">HTTP / WebSocket / QUIC Handlers</text>

  <!-- IOContext middle -->
  <rect class="group" x="40" y="170" width="640" height="200" rx="8"/>
  <text class="group-label" x="60" y="190">IOContext — Event Loop Coordinator</text>
  <rect class="io" x="80" y="210" width="180" height="50" rx="6"/>
  <text class="label" x="170" y="234">Main loop thread</text>
  <text class="small" x="170" y="250">IOContext::run()</text>

  <rect class="io" x="320" y="210" width="200" height="50" rx="6"/>
  <text class="label" x="420" y="234">IOContext::schedule</text>
  <text class="small" x="420" y="250">round-robin to queues</text>

  <rect class="io" x="560" y="210" width="100" height="50" rx="6"/>
  <text class="label" x="610" y="234">TaskQueues</text>
  <text class="small" x="610" y="250">0..N-1</text>

  <rect class="store" x="80" y="290" width="220" height="50" rx="6"/>
  <text class="label" x="190" y="314">pending_io_ map</text>
  <text class="small" x="190" y="330">fd → PendingIO</text>

  <rect class="store" x="320" y="290" width="220" height="50" rx="6"/>
  <text class="label" x="430" y="314">Timer heap</text>
  <text class="small" x="430" y="330">min-heap by next_fire</text>

  <!-- Worker pool (right of IOContext) -->
  <rect class="group" x="720" y="170" width="220" height="200" rx="8"/>
  <text class="group-label" x="740" y="190">Worker thread pool</text>
  <rect class="work" x="760" y="210" width="140" height="36" rx="6"/>
  <text class="label" x="830" y="233">Worker 0</text>
  <rect class="work" x="760" y="255" width="140" height="36" rx="6"/>
  <text class="label" x="830" y="278">Worker 1</text>
  <rect class="work" x="760" y="300" width="140" height="36" rx="6"/>
  <text class="label" x="830" y="323">Worker N-1</text>

  <!-- Coroutines (lower middle) -->
  <rect class="group" x="40" y="410" width="640" height="120" rx="8"/>
  <text class="group-label" x="60" y="430">Coroutine execution</text>
  <rect class="coro" x="80" y="450" width="170" height="60" rx="6"/>
  <text class="label" x="165" y="475">Coroutine A</text>
  <text class="small" x="165" y="495">suspended on I/O</text>
  <rect class="coro" x="280" y="450" width="170" height="60" rx="6"/>
  <text class="label" x="365" y="475">Coroutine B</text>
  <text class="small" x="365" y="495">running</text>
  <rect class="coro" x="480" y="450" width="170" height="60" rx="6"/>
  <text class="label" x="565" y="475">Coroutine C</text>
  <text class="small" x="565" y="495">awaiting timer</text>

  <!-- Platform I/O (bottom right) -->
  <rect class="group" x="720" y="410" width="220" height="200" rx="8"/>
  <text class="group-label" x="740" y="430">Platform I/O abstraction</text>
  <rect class="plat" x="760" y="450" width="140" height="60" rx="6"/>
  <text class="label" x="830" y="475">PlatformIO</text>
  <text class="small" x="830" y="495">epoll/kqueue/poll/IOCP</text>

  <rect class="plat" x="760" y="540" width="140" height="50" rx="6"/>
  <text class="label" x="830" y="564">OS kernel</text>
  <text class="small" x="830" y="580">fd events</text>

  <!-- Edges -->
  <!-- Handler -> schedule (returns Task) -->
  <line class="edge" x1="490" y1="110" x2="490" y2="210" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="500" y="142" width="86" height="14"/>
  <text class="edge-label" x="543" y="153" text-anchor="start">returns Task</text>

  <!-- schedule -> queues -->
  <line class="edge" x1="520" y1="235" x2="560" y2="235" marker-end="url(#arrow)"/>

  <!-- queues -> workers -->
  <line class="edge" x1="660" y1="235" x2="760" y2="235" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="673" y="221" width="60" height="14"/>
  <text class="edge-label" x="703" y="232">dequeue</text>

  <!-- workers -> coroutines (resume) -->
  <path class="edge" d="M830,336 L830,400 L565,400 L565,450" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="540" y="392" width="60" height="14"/>
  <text class="edge-label" x="570" y="403">resume</text>

  <!-- coroutines -> pending_io_ (co_await I/O) -->
  <path class="edge" d="M165,450 L165,400 L190,400 L190,340" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="92" y="408" width="92" height="14"/>
  <text class="edge-label" x="138" y="419">co_await I/O</text>

  <!-- coroutines -> timer heap -->
  <path class="edge" d="M565,450 L565,400 L430,400 L430,340" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="446" y="408" width="84" height="14"/>
  <text class="edge-label" x="488" y="419">co_await timer</text>

  <!-- coroutines -> queues (yield re-schedule) -->
  <path class="edge" d="M450,450 L450,390 L610,390 L610,260" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="555" y="378" width="42" height="14"/>
  <text class="edge-label" x="576" y="389">yield</text>

  <!-- PlatformIO -> OS kernel -->
  <line class="edge" x1="830" y1="510" x2="830" y2="540" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="838" y="514" width="46" height="14"/>
  <text class="edge-label" x="861" y="525" text-anchor="start">wait()</text>

  <!-- OS kernel -> PlatformIO (ready) -->
  <line class="edge" x1="800" y1="540" x2="800" y2="510" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="730" y="514" width="64" height="14"/>
  <text class="edge-label" x="762" y="525" text-anchor="end">fd ready</text>

  <!-- PlatformIO -> main loop -->
  <path class="edge" d="M830,450 L830,380 L170,380 L170,260" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="220" y="370" width="100" height="14"/>
  <text class="edge-label" x="270" y="381">events</text>

  <!-- Main loop -> queues (schedule ready) -->
  <path class="edge" d="M260,235 L320,235" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="263" y="220" width="58" height="14"/>
  <text class="edge-label" x="292" y="231">enqueue</text>

  <!-- Caption -->
  <text class="label" x="490" y="680" style="font-size:12px; fill:#666">
    A single IOContext owns the event loop, worker pool, and platform-I/O demultiplexer. Coroutines
  </text>
  <text class="label" x="490" y="698" style="font-size:12px; fill:#666">
    suspended on I/O or timers are resumed by the main loop and dispatched to workers via round-robin queues.
  </text>
</svg>
