<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 980" role="img" aria-labelledby="title">
  <title id="title">Coroutine lifecycle around a single async_read</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#444" stroke-width="1.4"/>
    </marker>
    <style>
      .actor { fill: #e1f5ff; stroke: #555; stroke-width: 1.4; }
      .lifeline { stroke: #888; stroke-width: 1; stroke-dasharray: 4 3; }
      .msg { stroke: #444; stroke-width: 1.4; fill: none; }
      .msg-dashed { stroke: #444; stroke-width: 1.4; fill: none; stroke-dasharray: 5 3; }
      .label { font: 13px sans-serif; fill: #222; text-anchor: middle; }
      .msg-label { font: 12px sans-serif; fill: #222; text-anchor: middle; }
      .small { font: 11px sans-serif; fill: #555; text-anchor: middle; }
      .note { fill: #fffbe6; stroke: #c9a341; stroke-width: 1; }
      .note-label { font: 11px sans-serif; fill: #5a4710; text-anchor: middle; }
      .step { font: 600 11px sans-serif; fill: #2c3e50; text-anchor: middle; }
    </style>
  </defs>

  <!-- Participants: 9 lifelines at x = 70, 200, 330, 460, 590, 720, 850, 980, 1110 -->
  <g>
    <rect class="actor" x="20"   y="30" width="100" height="44" rx="6"/>
    <text class="label" x="70"   y="50">Handler</text>
    <text class="small" x="70"   y="65">code</text>
    <rect class="actor" x="150"  y="30" width="100" height="44" rx="6"/>
    <text class="label" x="200"  y="50">Coroutine</text>
    <text class="small" x="200"  y="65">frame</text>
    <rect class="actor" x="280"  y="30" width="100" height="44" rx="6"/>
    <text class="label" x="330"  y="50">Task</text>
    <text class="small" x="330"  y="65">Promise</text>
    <rect class="actor" x="410"  y="30" width="100" height="44" rx="6"/>
    <text class="label" x="460"  y="50">Socket</text>
    <text class="small" x="460"  y="65">async_read</text>
    <rect class="actor" x="540"  y="30" width="100" height="44" rx="6"/>
    <text class="label" x="590"  y="50">IOContext</text>
    <rect class="actor" x="670"  y="30" width="100" height="44" rx="6"/>
    <text class="label" x="720"  y="50">PlatformIO</text>
    <rect class="actor" x="800"  y="30" width="100" height="44" rx="6"/>
    <text class="label" x="850"  y="50">OS</text>
    <text class="small" x="850"  y="65">kernel</text>
    <rect class="actor" x="930"  y="30" width="100" height="44" rx="6"/>
    <text class="label" x="980"  y="50">TaskQueue</text>
    <rect class="actor" x="1060" y="30" width="100" height="44" rx="6"/>
    <text class="label" x="1110" y="50">Worker</text>
    <text class="small" x="1110" y="65">thread</text>
  </g>

  <!-- Lifelines -->
  <line class="lifeline" x1="70"   y1="74" x2="70"   y2="940"/>
  <line class="lifeline" x1="200"  y1="74" x2="200"  y2="940"/>
  <line class="lifeline" x1="330"  y1="74" x2="330"  y2="940"/>
  <line class="lifeline" x1="460"  y1="74" x2="460"  y2="940"/>
  <line class="lifeline" x1="590"  y1="74" x2="590"  y2="940"/>
  <line class="lifeline" x1="720"  y1="74" x2="720"  y2="940"/>
  <line class="lifeline" x1="850"  y1="74" x2="850"  y2="940"/>
  <line class="lifeline" x1="980"  y1="74" x2="980"  y2="940"/>
  <line class="lifeline" x1="1110" y1="74" x2="1110" y2="940"/>

  <!-- 1. Handler -> Coroutine: Task handle_request(...) -->
  <text class="step" x="40" y="108">1</text>
  <line class="msg" x1="70" y1="110" x2="200" y2="110" marker-end="url(#arrow)"/>
  <text class="msg-label" x="135" y="103">Task handle_request(...)</text>

  <!-- 2. Coroutine -> Promise: initial_suspend → suspend_always -->
  <text class="step" x="170" y="143">2</text>
  <line class="msg" x1="200" y1="145" x2="330" y2="145" marker-end="url(#arrow)"/>
  <text class="msg-label" x="265" y="138">initial_suspend → suspend_always</text>

  <!-- note over Coroutine: suspended at start -->
  <rect class="note" x="150" y="160" width="220" height="28" rx="4"/>
  <text class="note-label" x="260" y="178">Coroutine suspended at start</text>

  <!-- 3. Handler -> IOContext: schedule(Task) -->
  <text class="step" x="40" y="208">3</text>
  <line class="msg" x1="70" y1="210" x2="590" y2="210" marker-end="url(#arrow)"/>
  <text class="msg-label" x="330" y="203">schedule(Task)</text>

  <!-- 4. IOContext -> TaskQueue: enqueue (round-robin) -->
  <text class="step" x="555" y="243">4</text>
  <line class="msg" x1="590" y1="245" x2="980" y2="245" marker-end="url(#arrow)"/>
  <text class="msg-label" x="785" y="238">enqueue(Task)   [round-robin]</text>

  <!-- 5. Queue -> Worker: dequeue -->
  <text class="step" x="945" y="278">5</text>
  <line class="msg" x1="980" y1="280" x2="1110" y2="280" marker-end="url(#arrow)"/>
  <text class="msg-label" x="1045" y="273">dequeue</text>

  <!-- 6. Worker -> Coroutine: handle.resume() -->
  <text class="step" x="1080" y="313">6</text>
  <line class="msg" x1="1110" y1="315" x2="200" y2="315" marker-end="url(#arrow)"/>
  <text class="msg-label" x="655" y="308">handle.resume()</text>

  <rect class="note" x="160" y="328" width="200" height="26" rx="4"/>
  <text class="note-label" x="260" y="345">Coroutine executing</text>

  <!-- 7. Coroutine -> Socket: co_await async_read(buffer) -->
  <text class="step" x="170" y="378">7</text>
  <line class="msg" x1="200" y1="380" x2="460" y2="380" marker-end="url(#arrow)"/>
  <text class="msg-label" x="330" y="373">co_await async_read(buffer)</text>

  <!-- 8. Socket self: await_ready() → false -->
  <text class="step" x="425" y="408">8</text>
  <path class="msg" d="M460,410 L510,410 L510,432 L470,432" marker-end="url(#arrow)"/>
  <text class="msg-label" x="530" y="405" text-anchor="start">await_ready() → false</text>

  <!-- 9. Socket -> IO: register_io(fd, EVENT_READ, handle) -->
  <text class="step" x="425" y="463">9</text>
  <line class="msg" x1="460" y1="465" x2="590" y2="465" marker-end="url(#arrow)"/>
  <text class="msg-label" x="525" y="458">register_io(fd, READ, handle)</text>

  <!-- 10. IO -> PlatformIO: add_fd / pending_io_[fd].read = handle -->
  <text class="step" x="555" y="498">10</text>
  <line class="msg" x1="590" y1="500" x2="720" y2="500" marker-end="url(#arrow)"/>
  <text class="msg-label" x="655" y="493">add_fd(fd, EVENT_READ)</text>

  <text class="step" x="555" y="528">11</text>
  <path class="msg" d="M590,530 L640,530 L640,552 L600,552" marker-end="url(#arrow)"/>
  <text class="msg-label" x="660" y="525" text-anchor="start">pending_io_[fd].read = handle</text>

  <!-- 12. Socket -> Coroutine: await_suspend() → suspend  (this triggers the suspension; coroutine returns to worker) -->
  <text class="step" x="425" y="583">12</text>
  <line class="msg-dashed" x1="460" y1="585" x2="200" y2="585" marker-end="url(#arrow-open)"/>
  <text class="msg-label" x="330" y="578">await_suspend()  (frame parked)</text>

  <rect class="note" x="150" y="598" width="230" height="40" rx="4"/>
  <text class="note-label" x="265" y="616">Coroutine suspended;</text>
  <text class="note-label" x="265" y="630">handle owned by pending_io_</text>

  <!-- 13. Coroutine -> Worker: returns to worker -->
  <text class="step" x="170" y="668">13</text>
  <line class="msg-dashed" x1="200" y1="670" x2="1110" y2="670" marker-end="url(#arrow-open)"/>
  <text class="msg-label" x="655" y="663">control returns to worker (no more work, yield)</text>

  <!-- 14. Kernel -> PlatformIO: fd readable -->
  <text class="step" x="815" y="713">14</text>
  <line class="msg" x1="850" y1="715" x2="720" y2="715" marker-end="url(#arrow)"/>
  <text class="msg-label" x="785" y="708">fd becomes readable</text>

  <!-- 15. PlatformIO -> IO: wait() returns events -->
  <text class="step" x="685" y="743">15</text>
  <line class="msg" x1="720" y1="745" x2="590" y2="745" marker-end="url(#arrow)"/>
  <text class="msg-label" x="655" y="738">wait() returns events</text>

  <!-- 16. IO self: process_io_events / extract handle -->
  <text class="step" x="555" y="773">16</text>
  <path class="msg" d="M590,775 L650,775 L650,797 L600,797" marker-end="url(#arrow)"/>
  <text class="msg-label" x="660" y="776" text-anchor="start">process_io_events()</text>
  <text class="msg-label" x="660" y="792" text-anchor="start">extract handle from pending_io_</text>

  <!-- 17. IO -> Queue: schedule(Task{handle}) -->
  <text class="step" x="555" y="828">17</text>
  <line class="msg" x1="590" y1="830" x2="980" y2="830" marker-end="url(#arrow)"/>
  <text class="msg-label" x="785" y="823">schedule(Task{handle})</text>

  <!-- 18. Queue -> Worker: dequeue -->
  <text class="step" x="945" y="858">18</text>
  <line class="msg" x1="980" y1="860" x2="1110" y2="860" marker-end="url(#arrow)"/>
  <text class="msg-label" x="1045" y="853">dequeue</text>

  <!-- 19. Worker -> Coroutine: handle.resume() -->
  <text class="step" x="1080" y="888">19</text>
  <line class="msg" x1="1110" y1="890" x2="200" y2="890" marker-end="url(#arrow)"/>
  <text class="msg-label" x="655" y="883">handle.resume()  (may be a different worker)</text>

  <!-- 20. Coroutine -> Promise: co_return -->
  <text class="step" x="265" y="923">20</text>
  <line class="msg" x1="200" y1="925" x2="330" y2="925" marker-end="url(#arrow)"/>
  <text class="msg-label" x="265" y="918">await_resume() returns; co_return</text>

  <!-- Caption -->
  <text class="label" x="585" y="970" style="font-size:12px; fill:#666">
    Suspension hands the handle to pending_io_; readiness hands it back to a task queue. The coroutine may resume on any worker.
  </text>
</svg>
