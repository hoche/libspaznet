<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="title">
  <title id="title">Task continuation chaining</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <style>
      .group { fill: none; stroke: #888; stroke-dasharray: 5 3; stroke-width: 1; }
      .group-label { font: 600 12px sans-serif; fill: #555; }
      .node { stroke: #555; stroke-width: 1.4; }
      .a { fill: #e1f5ff; }
      .b { fill: #fff4e1; }
      .c { fill: #f0e1ff; }
      .label { font: 13px sans-serif; fill: #222; text-anchor: middle; }
      .edge { stroke: #444; stroke-width: 1.4; fill: none; }
      .edge-dashed { stroke: #444; stroke-width: 1.4; fill: none; stroke-dasharray: 4 3; }
      .edge-label { font: 11px sans-serif; fill: #333; text-anchor: middle; }
      .edge-label-bg { fill: white; }
    </style>
  </defs>

  <!-- Task A subgraph -->
  <rect class="group" x="30" y="40" width="280" height="170" rx="8"/>
  <text class="group-label" x="50" y="60">Task A</text>
  <rect class="node a" x="70" y="80" width="200" height="36" rx="6"/>
  <text class="label" x="170" y="103">Coroutine Frame A</text>
  <rect class="node a" x="70" y="125" width="200" height="36" rx="6"/>
  <text class="label" x="170" y="148">TaskPromise A</text>
  <rect class="node a" x="70" y="170" width="200" height="32" rx="6"/>
  <text class="label" x="170" y="190">continuation = noop</text>

  <!-- Task B subgraph -->
  <rect class="group" x="410" y="40" width="280" height="170" rx="8"/>
  <text class="group-label" x="430" y="60">Task B</text>
  <rect class="node b" x="450" y="80" width="200" height="36" rx="6"/>
  <text class="label" x="550" y="103">Coroutine Frame B</text>
  <rect class="node b" x="450" y="125" width="200" height="36" rx="6"/>
  <text class="label" x="550" y="148">TaskPromise B</text>
  <rect class="node b" x="450" y="170" width="200" height="32" rx="6"/>
  <text class="label" x="550" y="190">continuation = Task A handle</text>

  <!-- Awaiter -->
  <rect class="group" x="240" y="270" width="240" height="100" rx="8"/>
  <text class="group-label" x="260" y="290">co_await Task B</text>
  <rect class="node c" x="290" y="310" width="140" height="36" rx="6"/>
  <text class="label" x="360" y="333">Awaiter</text>

  <!-- Edges -->
  <!-- Task A → Awaiter -->
  <path class="edge" d="M170,210 Q170,270 290,328" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="190" y="250" width="92" height="16"/>
  <text class="edge-label" x="236" y="262">co_await Task B</text>

  <!-- Awaiter → Task B (await_suspend) -->
  <path class="edge" d="M430,328 Q500,290 550,210" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="455" y="255" width="92" height="16"/>
  <text class="edge-label" x="501" y="267">await_suspend</text>

  <!-- final_suspend → continuation (B → continuation field) -->
  <line class="edge" x1="550" y1="161" x2="550" y2="170" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="555" y="158" width="76" height="16"/>
  <text class="edge-label" x="593" y="170" text-anchor="start">final_suspend</text>

  <!-- continuation B -.-> Coroutine A (resume) -->
  <path class="edge-dashed" d="M450,186 Q360,186 270,140" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="330" y="170" width="60" height="16"/>
  <text class="edge-label" x="360" y="182">resume</text>

  <!-- Caption -->
  <text class="label" x="360" y="420" style="font-size:12px; fill:#666">
    Task B stores Task A's handle in its promise's continuation field;
  </text>
  <text class="label" x="360" y="438" style="font-size:12px; fill:#666">
    when B's final_suspend fires, A resumes.
  </text>
</svg>
