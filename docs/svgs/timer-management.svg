<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" role="img" aria-labelledby="title">
  <title id="title">Timer management — sleep_for to fire</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#444" stroke-width="1.4"/>
    </marker>
    <style>
      .actor { fill: #e1f5ff; stroke: #555; stroke-width: 1.4; }
      .lifeline { stroke: #888; stroke-width: 1; stroke-dasharray: 4 3; }
      .msg { stroke: #444; stroke-width: 1.4; fill: none; }
      .self { stroke: #444; stroke-width: 1.4; fill: none; }
      .label { font: 13px sans-serif; fill: #222; text-anchor: middle; }
      .msg-label { font: 12px sans-serif; fill: #222; text-anchor: middle; }
      .small { font: 11px sans-serif; fill: #555; text-anchor: middle; }
      .alt-frame { fill: none; stroke: #888; stroke-width: 1.3; }
      .alt-label-bg { fill: #e1f5ff; stroke: #555; stroke-width: 1; }
      .alt-tag { font: 600 11px sans-serif; fill: #2c3e50; }
      .note { fill: #fffbe6; stroke: #c9a341; stroke-width: 1; }
      .note-label { font: 11px sans-serif; fill: #5a4710; text-anchor: middle; }
    </style>
  </defs>

  <!-- Participants -->
  <!-- 6 lifelines at x: 90, 250, 410, 570, 730, 890 -->
  <g>
    <rect class="actor" x="40"  y="30" width="100" height="40" rx="6"/>
    <text class="label" x="90"  y="55">Coro</text>
    <rect class="actor" x="200" y="30" width="100" height="40" rx="6"/>
    <text class="label" x="250" y="55">Awaiter</text>
    <rect class="actor" x="360" y="30" width="100" height="40" rx="6"/>
    <text class="label" x="410" y="55">IOContext</text>
    <rect class="actor" x="520" y="30" width="100" height="40" rx="6"/>
    <text class="label" x="570" y="55">Heap</text>
    <rect class="actor" x="680" y="30" width="100" height="40" rx="6"/>
    <text class="label" x="730" y="55">MainLoop</text>
    <rect class="actor" x="840" y="30" width="100" height="40" rx="6"/>
    <text class="label" x="890" y="55">TaskQueue</text>
  </g>

  <!-- Lifelines -->
  <line class="lifeline" x1="90"  y1="70" x2="90"  y2="680"/>
  <line class="lifeline" x1="250" y1="70" x2="250" y2="680"/>
  <line class="lifeline" x1="410" y1="70" x2="410" y2="680"/>
  <line class="lifeline" x1="570" y1="70" x2="570" y2="680"/>
  <line class="lifeline" x1="730" y1="70" x2="730" y2="680"/>
  <line class="lifeline" x1="890" y1="70" x2="890" y2="680"/>

  <!-- 1. Coro -> Awaiter: co_await sleep_for(100ms) -->
  <line class="msg" x1="90" y1="105" x2="250" y2="105" marker-end="url(#arrow)"/>
  <text class="msg-label" x="170" y="98">co_await sleep_for(100ms)</text>

  <!-- 2. Awaiter self: await_ready() -> false -->
  <path class="self" d="M250,135 L300,135 L300,160 L260,160" marker-end="url(#arrow)"/>
  <text class="msg-label" x="320" y="130" text-anchor="start">await_ready() → false</text>

  <!-- 3. Awaiter -> IO: add_timer(now+100ms, ..., handle) -->
  <line class="msg" x1="250" y1="195" x2="410" y2="195" marker-end="url(#arrow)"/>
  <text class="msg-label" x="330" y="188">add_timer(now+100ms, …, handle)</text>

  <!-- 4. IO -> Heap: push(TimerEntry) -->
  <line class="msg" x1="410" y1="230" x2="570" y2="230" marker-end="url(#arrow)"/>
  <text class="msg-label" x="490" y="223">push(TimerEntry)</text>

  <!-- Note over Heap -->
  <rect class="note" x="510" y="248" width="120" height="34" rx="4"/>
  <text class="note-label" x="570" y="263">Min-heap by</text>
  <text class="note-label" x="570" y="277">next_fire time</text>

  <!-- 5. MainLoop -> IO: process_timers() -->
  <line class="msg" x1="730" y1="320" x2="410" y2="320" marker-end="url(#arrow)"/>
  <text class="msg-label" x="570" y="313">process_timers()</text>

  <!-- 6. IO -> Heap: top() — check earliest -->
  <line class="msg" x1="410" y1="355" x2="570" y2="355" marker-end="url(#arrow)"/>
  <text class="msg-label" x="490" y="348">top()  (peek)</text>

  <!-- alt frame: not due vs due -->
  <rect class="alt-frame" x="220" y="380" width="720" height="240" rx="4"/>
  <rect class="alt-label-bg" x="225" y="380" width="48" height="20"/>
  <text class="alt-tag" x="231" y="395">alt</text>
  <text class="msg-label" x="290" y="394" text-anchor="start">timer not due yet</text>
  <line class="alt-frame" x1="220" y1="478" x2="940" y2="478"/>
  <rect class="alt-label-bg" x="225" y="478" width="60" height="20"/>
  <text class="alt-tag" x="231" y="493">else</text>
  <text class="msg-label" x="302" y="492" text-anchor="start">timer due</text>

  <!-- Branch A: not due -->
  <line class="msg" x1="410" y1="430" x2="730" y2="430" marker-end="url(#arrow)"/>
  <text class="msg-label" x="570" y="423">return earliest_due_in_ms</text>

  <path class="self" d="M730,445 L780,445 L780,468 L740,468" marker-end="url(#arrow)"/>
  <text class="msg-label" x="800" y="440" text-anchor="start">wait() with timeout</text>

  <!-- Branch B: due -->
  <line class="msg" x1="410" y1="520" x2="570" y2="520" marker-end="url(#arrow)"/>
  <text class="msg-label" x="490" y="513">pop()</text>

  <path class="self" d="M410,540 L470,540 L470,562 L420,562" marker-end="url(#arrow)"/>
  <text class="msg-label" x="486" y="535" text-anchor="start">check cancelled_timers_</text>

  <line class="msg" x1="410" y1="595" x2="890" y2="595" marker-end="url(#arrow)"/>
  <text class="msg-label" x="650" y="588">schedule(Task{handle})</text>

  <!-- TaskQueue -> Coro: resume (dashed return-style) -->
  <line class="msg" x1="890" y1="650" x2="90" y2="650" stroke="#444" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrow-open)" fill="none"/>
  <text class="msg-label" x="490" y="643">dequeue → resume coroutine</text>

  <!-- Caption -->
  <text class="label" x="500" y="700" style="font-size:12px; fill:#666">
    Repeating timers re-insert themselves at next_fire += interval after popping.
  </text>
</svg>
