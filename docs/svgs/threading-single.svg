<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 280" font-family="-apple-system,system-ui,sans-serif" font-size="13">
  <defs>
    <marker id="arr-s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="540" height="280" fill="#fafafa"/>
  <text x="270" y="22" text-anchor="middle" font-weight="600" font-size="15">Server(0) — single-thread</text>

  <!-- Main thread box -->
  <rect x="40" y="50" width="460" height="200" fill="#fff" stroke="#666" rx="6"/>
  <text x="270" y="70" text-anchor="middle" font-weight="600" fill="#555">main thread (calls Server::run)</text>

  <!-- IOContext inside -->
  <rect x="60" y="90" width="200" height="140" fill="#e8f1fc" stroke="#5586c0" rx="4"/>
  <text x="160" y="108" text-anchor="middle" font-weight="600">IOContext loop</text>
  <text x="160" y="128" text-anchor="middle" fill="#555">epoll/kqueue/poll</text>
  <text x="160" y="148" text-anchor="middle" fill="#555">wait for fd readiness</text>
  <text x="160" y="172" text-anchor="middle" fill="#555">↓</text>
  <text x="160" y="192" text-anchor="middle" fill="#555">resume coroutine</text>
  <text x="160" y="212" text-anchor="middle" fill="#555">inline on this thread</text>

  <!-- Coroutines column -->
  <rect x="290" y="90" width="190" height="140" fill="#e8fcef" stroke="#4ca766" rx="4"/>
  <text x="385" y="108" text-anchor="middle" font-weight="600">coroutines</text>
  <text x="385" y="130" text-anchor="middle" fill="#555">accept_connections</text>
  <text x="385" y="150" text-anchor="middle" fill="#555">handle_connection × N</text>
  <text x="385" y="170" text-anchor="middle" fill="#555">handle_request</text>
  <text x="385" y="190" text-anchor="middle" fill="#555">handle_message</text>
  <text x="385" y="215" text-anchor="middle" fill="#777" font-size="11">all interleaved, never parallel</text>

  <line x1="260" y1="160" x2="290" y2="160" stroke="#333" stroke-width="1.5" marker-end="url(#arr-s)"/>
</svg>
